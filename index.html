<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Interface </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">

        <!-- header section -->
        <header class="header">
            <h1>Weather Explorer</h1>
            <p>Stay updated with the latest weather updation</p>
        </header>

        <!-- search section -->

        <div class="search-section">
            <div class="input-section">
                <input class="input" type="text" placeholder="Search">
                <button class="search-btn">Search</button>
            </div>
        </div>

        <!-- city weather section -->

        <section class="city-weather">
            <i class="fa-solid fa-sun weather-icon"></i>

            <div class="city-info">
                <h2>Multan</h2>
                <h3>Temperature: 35.09C</h3>
                <h3>Clear Sky</h3>
            </div>

        </section>

        <section class="prediction">
            <div class="day-card">
                <h3>Saturday</h3>
                <i class="fa-solid fa-sun weather-icon"></i>
                <h4>34 C</h4>
            </div>

            <div class="day-card">
                <h3>Sunday</h3>
                <i class="fa-solid fa-sun weather-icon"></i>
                <h4>34 C</h4>
            </div>

            <div class="day-card">
                <h3>Monday</h3>
                <i class="fa-solid fa-sun weather-icon"></i>
                <h4>34 C</h4>
            </div>

            <div class="day-card">
                <h3>Tuesday</h3>
                <i class="fa-solid fa-sun weather-icon"></i>
                <h4>34 C</h4>
            </div>
        </section>

        
    </div>
    
</body>
</html>
